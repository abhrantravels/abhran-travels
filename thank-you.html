<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You — Abhran Travel</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
background:#f7f4ef;
font-family: 'DM Sans', sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.thank-container{
background:white;
padding:50px;
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
text-align:center;
max-width:500px;
width:90%;
}

.thank-icon{
font-size:60px;
margin-bottom:20px;
}

.thank-title{
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

.thank-text{
color:#666;
font-size:16px;
margin-bottom:30px;
}

.btn-home{
display:inline-block;
padding:12px 28px;
background:#c6a567;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.btn-home:hover{
background:#b59655;
}

</style>
</head>

<body>

<div class="thank-container">

<div class="thank-icon">✈️</div>

<div class="thank-title">
Thank You!
</div>

<div class="thank-text">
Your message has been sent successfully.<br>
Our team will contact you soon about your trip.
</div>

<a href="index.html" class="btn-home">
🏠 Back to Home
</a>

</div>

</body>
</html>
