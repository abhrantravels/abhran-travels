<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You — Abhran Travel</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family: 'DM Sans', sans-serif;
background:#0b1623;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.thank-wrapper{
text-align:center;
max-width:600px;
padding:40px;
}

.check{
font-size:70px;
margin-bottom:20px;
}

.title{
font-size:42px;
font-weight:700;
margin-bottom:15px;
}

.text{
font-size:18px;
color:#c9d1d9;
margin-bottom:35px;
line-height:1.6;
}

.btns{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.btn-main{
padding:14px 32px;
border-radius:30px;
background:#d39b4a;
color:white;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.btn-main:hover{
background:#c48934;
}

.btn-outline{
padding:14px 32px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.25);
color:white;
text-decoration:none;
transition:0.3s;
}

.btn-outline:hover{
background:rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<div class="thank-wrapper">

<div class="check">✈️</div>

<div class="title">
Thank You for Your Inquiry!
</div>

<div class="text">
Your message has been sent successfully.<br>
Our travel experts will contact you soon to help plan your perfect trip.
</div>

<div class="btns">

<a href="index.html" class="btn-main">
🏠 Back to Home
</a>

<a href="pages/trips.html" class="btn-outline">
🌍 Explore Trips
</a>

</div>

</div>

</body>

</html>
